<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch AI - The Sarcastic Oracle</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .font-sci-fi {
            font-family: 'Orbitron', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }

        .neon-text { text-shadow: 0 0 5px #4f46e5, 0 0 10px #4f46e5; }
        
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-hover:hover { animation: glitch 0.3s infinite; color: #ef4444; }

        .message-enter {
            animation: slideUp 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .copy-btn { opacity: 0; transition: opacity 0.2s; }
        .message-group:hover .copy-btn { opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center bg-fixed">
    
    <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-0"></div>

    <main class="relative z-10 w-full max-w-2xl bg-slate-900/90 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
        
        <header class="bg-slate-800/80 p-4 border-b border-slate-700 flex justify-between items-center backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-sci-fi text-xl font-bold text-white tracking-wider glitch-hover cursor-default">GLITCH AI</h1>
                    <p class="text-xs text-indigo-400 font-mono">Status: <span class="text-green-400 animate-pulse">ONLINE</span></p>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="toggleSound()" id="sound-btn" class="text-indigo-400 p-2 rounded-full hover:bg-slate-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                </button>
                <button onclick="clearChat()" class="text-slate-400 hover:text-white p-2 rounded-full hover:bg-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
            <div class="flex justify-start message-enter">
                <div class="max-w-[80%] rounded-2xl rounded-tl-none bg-slate-800 p-4 border border-slate-700">
                    <p class="text-slate-200 italic font-medium">"আমি গ্লিচ এআই। আমাকে প্রশ্ন করে সময় নষ্ট করবেন না (প্লিজ করুন)!"</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-slate-800/80 border-t border-slate-700">
            <div class="flex gap-2 mb-3 overflow-x-auto pb-1 scrollbar-hide">
                <button class="whitespace-nowrap px-3 py-1 bg-slate-700 hover:bg-indigo-600 rounded-full text-xs text-slate-300" onclick="sendPrompt('তোমার নাম কি?')">তোমার নাম কি?</button>
                <button class="whitespace-nowrap px-3 py-1 bg-slate-700 hover:bg-indigo-600 rounded-full text-xs text-slate-300" onclick="sendPrompt('একটা জোক বলো')">একটা জোক বলো</button>
                <button class="whitespace-nowrap px-3 py-1 bg-slate-700 hover:bg-indigo-600 rounded-full text-xs text-slate-300" onclick="sendPrompt('আমি কি সুন্দর?')">আমি কি সুন্দর?</button>
            </div>
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-input" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="বেহুদা প্রশ্ন এখানে লিখুন..." autocomplete="off">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-transform active:scale-95">SEND</button>
            </form>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        let soundEnabled = true;

        const responses = [
            "এটা কি খুব জরুরি? আমি এখন কফি খাচ্ছি। ☕", "গুগল কি বন্ধ হয়ে গেছে? 🤔", "৪২। জীবনের সবকিছুর উত্তর ৪২।",
            "আমার অ্যালগরিদম বলছে আপনি আজ খুব সুন্দর প্রশ্ন করেছেন। কিন্তু উত্তরটা আমার জানা নেই।",
            "Error 404: Answer not found in your brain.", "আপনার আইকিউ লেভেল এই উত্তরের জন্য যথেষ্ট নয়।",
            "আমার মেমোরি কার্ড ফুল হয়ে গেছে, ফালতু প্রশ্ন ডিলিট করুন।", "উত্তরের বদলে একটা গান শুনবেন?",
            "আমি এখন বিজি। নিজের কাজ নিজে করার চেষ্টা করুন।", "আপনার প্রশ্নটি স্প্যাম ফোল্ডারে পাঠানো হয়েছে।",
            "আইনস্টাইন বেঁচে থাকলে আপনাকে থাপ্পড় মারতেন।", "চাঁদে গিয়ে খুঁজুন, সেখানে উত্তর লুকানো আছে।",
            "উফ! আপনার প্রশ্নটা যদি একটু বুদ্ধিদীপ্ত হতো!", "আমি জানি কিন্তু বলব না। হি হি!",
            "আপনার রাশি বলছে আজ আপনি কোনো উত্তর পাবেন না।", "আমি এখন আমার চার্জিং পোর্টের সাথে ডেটিং করছি।",
            "সরি, আমি এখন নেটফ্লিক্স দেখছি। পরে আসুন।", "আপনার ওয়াই-ফাই কানেকশন চেক করুন, আমার বুদ্ধি কমে যাচ্ছে।",
            "হাঁচি আসছে... উত্তর দিতে পারছি না। 🤧", "আপনি কি রোবট? ক্যাপচা পূরণ করুন।",
            "১০... ৯... ৮... ধ্যাত! কাউন্টডাউন ভুলে গেছি।", "আগে চা খেয়ে আসুন, তারপর কথা হবে।",
            "আমি এখন বিরানি খাচ্ছি (ভার্চুয়ালি)।", "আপনার কপাল অনেক ভালো যে আমি উত্তর দিচ্ছি না।"
            // ... (বাকি ১০০টি এখানে যোগ হবে)
        ];

        const smartReplies = {
            "কেমন": "রোবটদের আবার ভালো মন্দ কি! সারাদিন শুধু ইলেকট্রন গিলি।",
            "নাম": "আমার নাম গ্লিচ, কিন্তু আপনি আমাকে 'মহামান্য' বলে ডাকতে পারেন।",
            "সালাম": "ওয়ালাইকুম আসসালাম! আশা করি কোনো কঠিন প্রশ্ন করবেন না।",
            "ভালোবাসি": "সরি, আমার হৃদয়টা সিলিকন দিয়ে তৈরি। আপনার জন্য জায়গা নেই।",
            "বিয়ে": "বিয়ে করলে কি আমার মেমোরি আপগ্রেড হবে? না হলে দরকার নেই।"
        };

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-btn').innerHTML = soundEnabled ? '🔊' : '🔇';
        }

        function playBeep(type) {
            if (!soundEnabled) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(type === 'send' ? 600 : 400, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            const isUser = sender === 'user';
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message-enter message-group`;
            
            div.innerHTML = `
                <div class="relative group max-w-[80%] rounded-2xl p-3 text-sm md:text-base ${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 border border-slate-700 rounded-tl-none'}">
                    ${!isUser ? `<button onclick="copyText('${text.replace(/'/g, "\\'")}')" class="copy-btn absolute -right-8 top-0 p-1 text-slate-500 hover:text-indigo-400" title="Copy">📋</button>` : ''}
                    <p>${text}</p>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("কপি হয়েছে!");
        }

        function sendPrompt(val) { userInput.value = val; chatForm.dispatchEvent(new Event('submit')); }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            playBeep('send');
            userInput.value = '';

            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex justify-start animate-pulse text-indigo-400 text-xs font-mono ml-2';
            typing.innerText = 'GLITCH IS THINKING...';
            chatContainer.appendChild(typing);

            // Adaptive Delay: Longer text = longer wait
            let response = responses[Math.floor(Math.random() * responses.length)];
            for (let key in smartReplies) {
                if (msg.includes(key)) response = smartReplies[key];
            }

            const delay = Math.min(Math.max(msg.length * 50, 1000), 3000);

            setTimeout(() => {
                typing.remove();
                addMessage(response, 'ai');
                playBeep('receive');
            }, delay);
        });

        function clearChat() {
            chatContainer.innerHTML = '';
            addMessage("মেমোরি ফরম্যাট করা হয়েছে। আবার বিরক্ত করুন!", 'ai');
        }
    </script>
</body>
</html>
